  function saveObservation(useAI) {
    var code = document.getElementById('obs-code');
    var desc = document.getElementById('obs-description');
    var editId = (document.getElementById('obs-edit-id') || {}).value;
    if (!code || !code.value || !desc || !desc.value.trim()) {
      toast('Code and description are required', 'error');
      return;
    }
    var rawDesc = desc.value.trim();
    var obsCode = code.value;
    var location = (document.getElementById('obs-location') || {}).value || '';
    var materials = (document.getElementById('obs-materials') || {}).value || '';
    var qty = (document.getElementById('obs-qty') || {}).value || '';

    /* Get raw file from input (if user selected one) — NO JavaScript file reading */
    var rawFile = null;
    var galInput = document.getElementById('obs-photo');
    var camInput = document.getElementById('obs-photo-cam');
    if (galInput && galInput.files && galInput.files[0]) rawFile = galInput.files[0];
    if (!rawFile && camInput && camInput.files && camInput.files[0]) rawFile = camInput.files[0];

    /* If not using AI, or no AI key — just save directly */
    var provider = useAI ? getSelectedProvider() : null;
    if (!provider) {
      doSaveObservation(editId, {
        code: obsCode, description: rawDesc, location: location,
        materials: materials, qty: qty
      }, rawFile);
      return;
    }

    /* Show processing state */
    var aiBtn = document.querySelector('[data-action="save-observation-ai"]');
    if (aiBtn) { aiBtn.disabled = true; aiBtn.innerHTML = '<div class="loading-spinner" style="width:1.25rem;height:1.25rem"></div> AI...'; }

    /* Use unified AI brain — ask it to reword + map to inspection */
    var aiPrompt = 'Reword this observation technically and identify inspection schedule items.\n' +
      'Observation (' + obsCode + '): "' + rawDesc + '"' + (location ? ' Location: ' + location : '') +
      '\n\nReturn JSON with: observations (with reworded description), inspection_updates, message.\n\n' + buildAIContext();

    sendToAI(aiPrompt, {}, function(result, err) {
      if (err) {
        /* Fallback: save raw */
        doSaveObservation(editId, {
          code: obsCode, description: rawDesc, location: location,
          materials: materials, qty: qty
        }, rawFile);
        if (aiBtn) { aiBtn.disabled = false; aiBtn.textContent = '★ Save + AI Review'; }
        return;
      }

      try {
        var jsonMatch = (result || '').match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('No JSON');
        var parsed = JSON.parse(jsonMatch[0]);

        /* Get reworded description from AI response */
        var finalDesc = rawDesc;
        if (parsed.observations && parsed.observations.length > 0 && parsed.observations[0].description) {
          finalDesc = parsed.observations[0].description;
        } else if (parsed.description) {
          finalDesc = parsed.description;
        }

        closeSheet();
        doSaveObservation(editId, {
          code: obsCode, description: finalDesc, location: location,
          materials: materials, qty: qty
        }, rawFile, function() {
          /* Update inspection schedule */
          var inspItems = parsed.inspection_updates || [];
          if (parsed.refs) {
            inspItems = parsed.refs.map(function(r) { return { item_ref: r, outcome: obsCode }; });
          }
          if (inspItems.length > 0 && state.currentSite) {
            api('PUT', '/sites/' + state.currentSite.id + '/inspections', inspItems).then(function(data) {
              state.inspections = data;
            }).catch(function() {});
          }
        });

        /* Show result */
        navigate('site-detail', {currentSiteTab: 'observations'});
        var aiResult = { actions: [], message: parsed.message || '' };
        if (parsed.inspection_updates && parsed.inspection_updates.length > 0) {
          aiResult.actions.push('Inspection: ' + parsed.inspection_updates.map(function(i) { return i.item_ref + '→' + i.outcome; }).join(', '));
        }
        if (finalDesc !== rawDesc) aiResult.actions.push('Reworded');
        toast(obsCode + ': ' + finalDesc.substring(0, 60) + (aiResult.actions.length ? ' • ' + aiResult.actions.join(' • ') : ''), 'success');
        showAIBanner(aiResult, rawDesc, parsed);

      } catch(e) {
        doSaveObservation(editId, {
          code: obsCode, description: rawDesc, location: location,
          materials: materials, qty: qty
        }, rawFile);
        if (aiBtn) { aiBtn.disabled = false; aiBtn.textContent = '★ Save + AI Review'; }
      }
    });
  }

  /* Actually persist the observation — single POST with FormData (Android-proof) */
  function doSaveObservation(editId, fields, rawFile, afterSave) {
    var token = state.token || localStorage.getItem('eicr_token');
    var fd = new FormData();
    /* IDs for create vs update */
    if (editId) fd.append('edit_id', editId);
    if (state.currentSite) fd.append('site_id', state.currentSite.id);
    /* Also put token in form as backup */
    fd.append('_token', token);
    /* Fields */
    fd.append('code', fields.code || '');
    fd.append('description', fields.description || '');
    fd.append('location', fields.location || '');
    fd.append('materials', fields.materials || '');
    fd.append('qty', fields.qty || '');

    /* Attach photo: raw file from input (browser handles natively) */
    if (rawFile) {
      fd.append('photo', rawFile);
    } else if (window._obsPhotoData) {
      fd.append('photo_data', window._obsPhotoData);
    }

    fetch('/api/observations/save?token=' + encodeURIComponent(token || ''), {
      method: 'POST',
      body: fd
    }).then(function(resp) {
      if (!resp.ok) {
        return resp.text().then(function(txt) {
          throw new Error('Server ' + resp.status + ': ' + txt.substring(0, 200));
        });
      }
      return resp.json();
    }).then(function(result) {
      toast('Observation saved', 'success');
      if (editId) {
        var idx = state.observations.findIndex(function(o) { return String(o.id) === String(editId); });
        if (idx !== -1) Object.assign(state.observations[idx], fields, result);
      } else {
        state.observations.push(result);
      }
      closeSheet();
      navigate('site-detail', {currentSiteTab: 'observations'});
      if (afterSave) afterSave();
    }).catch(function(err) {
      console.error('[obs-save] Error:', err);
      toast('Save failed: ' + err.message, 'error');
    });
  }

  /* ===== OBSERVATION TEXT FORMATTING ===== */
  function formatObsAllCaps() {
    if (!state.observations.length || !state.currentSite) return;
    var promises = state.observations.map(function(o) {
      var upper = (o.description || '').toUpperCase();
      var locUpper = (o.location || '').toUpperCase();
      if (upper === o.description && locUpper === o.location) return Promise.resolve(null);
      o.description = upper;
      o.location = locUpper;
      return api('PUT', '/observations/' + o.id, { description: upper, location: locUpper });
    });
    Promise.all(promises).then(function() {
      toast('All observations → CAPS', 'success');
      navigate('site-detail', { currentSiteTab: 'observations' });
    }).catch(function(err) { toast(err.message, 'error'); });
  }

  function toProperCase(str) {
    if (!str) return str;
    return str.replace(/\b\w+/g, function(w) {
      /* Keep common abbreviations uppercase */
      var keep = ['DB','RCD','MCB','RCBO','FCU','SWA','MICC','TPN','DP','SPN','AC','A','BS','EN','EICR','IP','LED','EL','UV','PIR','MK','CU','PVC'];
      if (keep.indexOf(w.toUpperCase()) !== -1) return w.toUpperCase();
      return w.charAt(0).toUpperCase() + w.slice(1).toLowerCase();
    });
  }

  function formatObsProperCase() {
    if (!state.observations.length || !state.currentSite) return;
    var promises = state.observations.map(function(o) {
      var proper = toProperCase(o.description || '');
      var locProper = toProperCase(o.location || '');
      if (proper === o.description && locProper === o.location) return Promise.resolve(null);
      o.description = proper;
      o.location = locProper;
      return api('PUT', '/observations/' + o.id, { description: proper, location: locProper });
    });
    Promise.all(promises).then(function() {
      toast('All observations → Proper Case', 'success');
      navigate('site-detail', { currentSiteTab: 'observations' });
    }).catch(function(err) { toast(err.message, 'error'); });
  }

  function formatObsSpellCheck() {
    if (!state.observations.length || !state.currentSite) return;
    var provider = getSelectedProvider();
    if (!provider) { toast('Add an AI key in Settings first', 'error'); return; }

    toast('Checking spelling & grammar...', 'info');
    var allText = state.observations.map(function(o, i) {
      return (i + 1) + '. [' + (o.code || '') + '] ' + (o.description || '') + ' | Location: ' + (o.location || '');
    }).join('\n');

    api('POST', '/ai/process', {
      key_id: provider.id,
      system_prompt: 'You are a spell-checker and grammar fixer for electrical inspection reports (BS 7671 EICR). ' +
        'Fix spelling errors, grammar issues, and punctuation. Keep electrical terms correct (e.g. RCBO, MCB, RCD, BS(EN), etc.). ' +
        'Keep the meaning identical. Do NOT add or remove observations. Return ONLY valid JSON.',
      prompt: 'Fix spelling and grammar in these EICR observations. Return JSON array with corrected text:\n\n' + allText +
        '\n\nReturn: {"corrections": [{"index": 0, "description": "corrected text", "location": "corrected location"}, ...]}\n' +
        'Only include entries that have changes. If nothing to fix, return {"corrections": []}'
    }).then(function(data) {
      var result = data.result || '';
      var jsonMatch = result.match(/\{[\s\S]*\}/);
      if (!jsonMatch) { toast('No corrections needed', 'success'); return; }
      var parsed = JSON.parse(jsonMatch[0]);
      if (!parsed.corrections || !parsed.corrections.length) { toast('No corrections needed', 'success'); return; }

      var updatePromises = parsed.corrections.map(function(c) {
        var obs = state.observations[c.index];
        if (!obs) return Promise.resolve(null);
        var updates = {};
        if (c.description && c.description !== obs.description) { obs.description = c.description; updates.description = c.description; }
        if (c.location && c.location !== obs.location) { obs.location = c.location; updates.location = c.location; }
        if (Object.keys(updates).length) return api('PUT', '/observations/' + obs.id, updates);
        return Promise.resolve(null);
      });
      return Promise.all(updatePromises).then(function() {
        toast(parsed.corrections.length + ' observation(s) corrected', 'success');
        navigate('site-detail', { currentSiteTab: 'observations' });
      });
    }).catch(function(err) { toast('Spell check error: ' + err.message, 'error'); });
  }

  /* ===== BULK SELECT / DELETE CIRCUITS ===== */
  function toggleBulkSelect() {
    _bulkSelectMode = !_bulkSelectMode;
    var bar = document.getElementById('bulk-select-bar');
    var btn = document.getElementById('bulk-select-btn');
    if (bar) bar.style.display = _bulkSelectMode ? 'flex' : 'none';
    if (btn) {
      btn.style.background = _bulkSelectMode ? '#fee2e2' : '';
      btn.style.color = _bulkSelectMode ? '#dc2626' : '';
      btn.innerHTML = _bulkSelectMode ? '&#10007; Cancel' : '<svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"/></svg> Select';
    }
    /* Toggle checkboxes on each row */
    var tbody = document.getElementById('circuit-tbody');
    if (!tbody) return;
    var rows = tbody.querySelectorAll('tr');
    rows.forEach(function(row, idx) {
      var existing = row.querySelector('.bulk-check');
      if (_bulkSelectMode && !existing) {
        var td = document.createElement('td');
        td.innerHTML = '<input type="checkbox" class="bulk-check" data-idx="' + idx + '" style="width:1.25rem;height:1.25rem;cursor:pointer">';
        row.insertBefore(td, row.firstChild);
      } else if (!_bulkSelectMode && existing) {
        existing.parentElement.remove();
      }
    });
    /* Also toggle header checkbox column */
    var thead = tbody.closest('table').querySelector('thead tr');
    if (thead) {
      var existingTh = thead.querySelector('.bulk-check-th');
      if (_bulkSelectMode && !existingTh) {
        var th = document.createElement('th');
        th.className = 'bulk-check-th';
        th.innerHTML = '<input type="checkbox" data-action="bulk-toggle-all" style="width:1.25rem;height:1.25rem;cursor:pointer">';
        thead.insertBefore(th, thead.firstChild);
      } else if (!_bulkSelectMode && existingTh) {
        existingTh.remove();

    var checks = document.querySelectorAll('.bulk-check:checked');
    var el = document.getElementById('bulk-select-count');
    if (el) el.textContent = checks.length + ' selected';

    var checks = document.querySelectorAll('.bulk-check');

  function bulkClearSelected() {
    var checks = document.querySelectorAll('.bulk-check:checked');
    if (!checks.length) { toast('Select circuits first', 'error'); return; }
    snapshotCircuits();
    var keepFields = ['id','board_id','number','sort_order','created_at'];
    checks.forEach(function(c) {
      var idx = parseInt(c.getAttribute('data-idx'));
      var circ = state.circuits[idx];
      if (!circ) return;
      Object.keys(circ).forEach(function(k) {
        if (keepFields.indexOf(k) === -1) circ[k] = '';
      });
    });
    saveAllCircuits(true);
    toast(checks.length + ' circuits cleared', 'success');
    navigate('board-detail');
  }

  function bulkDeleteSelected() {
    var checks = document.querySelectorAll('.bulk-check:checked');
    if (!checks.length) { toast('Select circuits first', 'error'); return; }
    snapshotCircuits();
    var indices = [];
    checks.forEach(function(c) { indices.push(parseInt(c.getAttribute('data-idx'))); });
    /* Get circuit IDs from state */
    var ids = indices.map(function(i) { return state.circuits[i] && state.circuits[i].id; }).filter(Boolean);
    if (!ids.length) { toast('No saved circuits selected', 'error'); return; }

    api('POST', '/boards/' + state.currentBoard.id + '/circuits/bulk-delete', { ids: ids }).then(function(data) {
      state.circuits = data.map(mapCircuitFromDB);
      _bulkSelectMode = false;
      toast(ids.length + ' circuits deleted', 'success');
      navigate('board-detail');
    }).catch(function(err) { toast(err.message, 'error'); });
  }

  /* ===== CIRCUIT RENUMBERING ===== */
  function renumberCircuits(mode) {
    if (!state.circuits.length || !state.currentBoard) { toast('No circuits to renumber', 'error'); return; }
    var count = state.circuits.length;

    if (mode === 'SP') {
      /* Single phase: 1, 2, 3, 4... */
      state.circuits.forEach(function(c, i) { c.number = String(i + 1); });
    } else {
      /* Three phase: 1L1, 1L2, 1L3, 2L1, 2L2, 2L3... */
      var phases = ['L1', 'L2', 'L3'];
      state.circuits.forEach(function(c, i) {
        var row = Math.floor(i / 3) + 1;
        c.number = row + phases[i % 3];
      });
    }

    /* Use replace mode to delete-all-then-insert — prevents duplication */
    var updates = state.circuits.map(function(c) {
      var obj = {};
      Object.keys(c).forEach(function(k) {
        if (k !== 'id' && k !== 'board_id') obj[k] = c[k];
      });
      return obj;
    });
    api('PUT', '/boards/' + state.currentBoard.id + '/circuits/bulk?replace=1', updates).then(function(data) {
      state.circuits = data.map(mapCircuitFromDB);
      toast(count + ' circuits renumbered (' + mode + ')', 'success');
      navigate('board-detail');
    }).catch(function(err) { toast(err.message, 'error'); });
  }

  function formatBoardSpellCheck() {
    if (!state.circuits.length) { toast('No circuits to check', 'error'); return; }
    var provider = getSelectedProvider();
    if (!provider) { toast('Add an AI key in Settings first', 'error'); return; }

    toast('Checking spelling & grammar...', 'info');
    var boardInfo = state.currentBoard ? 'Board: ' + (state.currentBoard.ref || '') + ' at ' + (state.currentBoard.location || '') + ', supplied from ' + (state.currentBoard.supplied_from || '') + '\n' : '';
    var circuitText = state.circuits.map(function(c, i) {
      return (i + 1) + '. #' + (c.number || '') + ' ' + (c.description || '');
    }).join('\n');

    api('POST', '/ai/process', {
      key_id: provider.id,
      system_prompt: 'You are a spell-checker for BS 7671 EICR circuit schedules. Fix spelling errors and grammar. ' +
        'Keep ALL electrical terms correct (RCBO, MCB, RCD, FCU, SWA, MICC, T+E, CU, etc.). ' +
        'Keep circuit descriptions concise and technical. Do NOT change meaning. Return ONLY valid JSON.',
      prompt: 'Fix spelling/grammar in this board data:\n\n' + boardInfo + circuitText +
        '\n\nReturn: {"board": {"location": "...", "supplied_from": "..."}, "circuits": [{"index": 0, "description": "corrected"}]}\n' +
        'Only include entries with changes. Empty = no fixes needed.'
    }).then(function(data) {
      var result = data.result || '';
      var jsonMatch = result.match(/\{[\s\S]*\}/);
      if (!jsonMatch) { toast('No corrections needed', 'success'); return; }
      var parsed = JSON.parse(jsonMatch[0]);
      var count = 0;

      if (parsed.board && state.currentBoard) {
        var bu = parsed.board;
        if (bu.location && bu.location !== state.currentBoard.location) { state.currentBoard.location = bu.location; count++; }
        if (bu.supplied_from && bu.supplied_from !== state.currentBoard.supplied_from) { state.currentBoard.supplied_from = bu.supplied_from; count++; }
        if (count) api('PUT', '/boards/' + state.currentBoard.id, state.currentBoard).catch(function(){});
      }
      if (parsed.circuits && parsed.circuits.length) {
        parsed.circuits.forEach(function(c) {
          var circ = state.circuits[c.index];
          if (circ && c.description && c.description !== circ.description) { circ.description = c.description; count++; }
        });
        if (parsed.circuits.length) saveAllCircuits(true);
      }
      toast(count ? count + ' correction(s) applied' : 'No corrections needed', 'success');
      navigate('board-detail');
    }).catch(function(err) { toast('Spell check error: ' + err.message, 'error'); });
  }

  function generateReport() {
    var siteId = state.currentSite.id;
    var container = document.getElementById('report-link');
    if (container) {
      container.innerHTML = '<div class="flex items-center gap-2 py-4 justify-center"><div class="loading-spinner"></div><span>Generating report...</span></div>';
    }

    /* Fetch report HTML with proper auth header — avoids token-in-URL issues */
    fetch('/api/sites/' + siteId + '/report', {
      headers: { 'Authorization': 'Bearer ' + state.token }
    }).then(function(r) {
      if (!r.ok) throw new Error('Report failed: ' + r.status);
      return r.text();
    }).then(function(html) {
      /* Inject base tag so images/resources resolve correctly */
      var baseUrl = window.location.origin + '/';
      html = html.replace('<head>', '<head><base href="' + baseUrl + '">');

      /* Open report in new window and write the HTML directly */
      var w = window.open('', '_blank');
      if (!w) {
        /* Popup blocked — fall back to blob download */
        var blob = new Blob([html], { type: 'text/html' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'EICR-Report-' + (state.currentSite.name || 'report').replace(/[^a-zA-Z0-9]/g, '-') + '.html';
        a.click();
        URL.revokeObjectURL(url);
        toast('Report downloaded — open it and print to PDF', 'success');
        if (container) container.innerHTML = '<p class="text-green-600 text-sm text-center">&#10003; Report downloaded</p>';
        return;
      }
      w.document.write(html);
      w.document.close();
      toast('Report opened — use Print (Ctrl+P) to save as PDF', 'success');

      if (container) {
        container.innerHTML = '<button class="btn btn-primary w-full" data-action="generate-report">' +
          '<svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>' +
          'Generate Again</button>' +
          '<p class="text-xs text-slate-500 mt-2 text-center">Report opens in new tab — use Print / Save as PDF</p>';
      }
    }).catch(function(err) {
      toast(err.message, 'error');
      if (container) {
        container.innerHTML = '<p class="text-red-500 text-sm">' + esc(err.message) + '</p>' +
          '<button class="btn btn-primary w-full mt-2" data-action="generate-report">Try Again</button>';
      }
    });
  }

  var _sigCtx = null;
  var _sigDrawing = false;
  function initSigCanvas() {
    var canvas = document.getElementById('sig-canvas');
    if (!canvas) return;
    _sigCtx = canvas.getContext('2d');
    _sigCtx.lineWidth = 2;
    _sigCtx.lineCap = 'round';
    _sigCtx.strokeStyle = '#000';

    function getPos(ev) {
      var rect = canvas.getBoundingClientRect();
      var t = ev.touches ? ev.touches[0] : ev;
      return { x: (t.clientX - rect.left) * (canvas.width / rect.width), y: (t.clientY - rect.top) * (canvas.height / rect.height) };
    }
    canvas.addEventListener('mousedown', function(ev) { _sigDrawing = true; var p = getPos(ev); _sigCtx.beginPath(); _sigCtx.moveTo(p.x, p.y); });
    canvas.addEventListener('mousemove', function(ev) { if (!_sigDrawing) return; var p = getPos(ev); _sigCtx.lineTo(p.x, p.y); _sigCtx.stroke(); });
    canvas.addEventListener('mouseup', function() { _sigDrawing = false; });
    canvas.addEventListener('touchstart', function(ev) { ev.preventDefault(); _sigDrawing = true; var p = getPos(ev); _sigCtx.beginPath(); _sigCtx.moveTo(p.x, p.y); }, {passive:false});
    canvas.addEventListener('touchmove', function(ev) { ev.preventDefault(); if (!_sigDrawing) return; var p = getPos(ev); _sigCtx.lineTo(p.x, p.y); _sigCtx.stroke(); }, {passive:false});
    canvas.addEventListener('touchend', function() { _sigDrawing = false; });

    /* File upload for existing signature image */
    var upload = document.getElementById('sig-upload');
    if (upload) {
      upload.addEventListener('change', function() {
        if (!this.files[0]) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          var img = new Image();
          img.onload = function() {
            _sigCtx.clearRect(0, 0, canvas.width, canvas.height);
            _sigCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(this.files[0]);
      });
    }
  }

  function clearSigCanvas() {
    var canvas = document.getElementById('sig-canvas');
    if (canvas && _sigCtx) _sigCtx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function saveTester(existingId) {
    var name = document.getElementById('tester-name');
    if (!name || !name.value.trim()) { toast('Name is required', 'error'); return; }

    var sigData = '';
    var canvas = document.getElementById('sig-canvas');
    if (canvas) {
      /* Check if canvas has anything drawn */
      var imgData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
      var hasContent = false;
      for (var i = 3; i < imgData.data.length; i += 4) {
        if (imgData.data[i] > 0) { hasContent = true; break; }
      }
      if (hasContent) sigData = canvas.toDataURL('image/png');
    }

    var body = {
      name: name.value.trim(),
      position: (document.getElementById('tester-position') || {}).value || 'Electrician',
      is_qs: (document.getElementById('tester-is-qs') || {}).value === 'true',

    };
    if (sigData) body.signature_data = sigData;

    var method = existingId ? 'PUT' : 'POST';

  function buildAIContext() {
    var ctx = '';

    if (state.currentBoard) {
      var b = state.currentBoard;
      ctx += 'BOARD: ' + (b.ref || '') + ' at ' + (b.location || '');
      ctx += ' | Supplied from: ' + (b.supplied_from || '-') + ' | Phases: ' + (b.num_phases || '1');
      ctx += ' | Ze: ' + (b.ze || '-') + ' | Ipf: ' + (b.ipf || '-');
      ctx += ' | Dist: ' + (b.dist_type || '-') + ' | OCPD: ' + (b.ocpd_type || '-') + (b.ocpd_rating || '') + 'A';
      ctx += ' | Instruments — Multi: ' + (b.instruments_multi || '-') + ' IR: ' + (b.instruments_ir || '-') +
        ' Cont: ' + (b.instruments_cont || '-') + ' Loop: ' + (b.instruments_loop || '-') +
        ' RCD: ' + (b.instruments_rcd || '-') + ' Earth: ' + (b.instruments_earth || '-');
    }

    if (state.circuits && state.circuits.length > 0) {
      ctx += '\nCIRCUITS (' + state.circuits.length + '):\n' + state.circuits.map(function(c) {
        return buildCircuitSummary(c);
      }).join('\n');
    }

    if (state.observations && state.observations.length > 0) {
      ctx += '\nOBSERVATIONS: ' + state.observations.map(function(o) {
        return o.code + ': ' + (o.description || '').substring(0, 60);
      }).join(' | ');
    }

    if (state.inspections && state.inspections.length > 0) {
      ctx += '\nINSPECTION SET: ' + state.inspections.map(function(i) {
        return i.item_ref + '=' + i.outcome;
      }).join(', ');
    }

    if (state.currentSite) {
      ctx += '\nSITE: ' + (state.currentSite.name || '') + ' | ' + (state.currentSite.address || '');
    }

    return ctx;
  }

  /* Process ALL AI action types from a parsed JSON response */
  function processAIActions(parsed, opts) {
    opts = opts || {};
    var actions = [];

    /* Circuit deletions */
    if (parsed.delete && parsed.delete.length > 0) {
      var deleteNums = parsed.delete.map(String);
      var before = state.circuits.length;
      state.circuits = state.circuits.filter(function(c) {
        return deleteNums.indexOf(String(c.number)) === -1;
      });
      actions.push('Removed ' + (before - state.circuits.length) + ' circuit(s)');
    }

    /* Renumber */
    if (parsed.renumber) {
      state.circuits.forEach(function(c, i) { c.number = String(i + 1); });
      actions.push('Renumbered 1-' + state.circuits.length);
    }

    /* Circuit updates — only update EXISTING circuits by number, never add extras */
    if (parsed.updates && parsed.updates.length > 0) {
      var updated = 0, skipped = 0;
      parsed.updates.forEach(function(u) {
        var num = String(u.number || '').trim();
        var existing = state.circuits.findIndex(function(c) {
          return String(c.number || '').trim() === num ||
                 String(c.number || '').trim().toUpperCase() === num.toUpperCase();
        });
        if (existing !== -1) {
          /* Merge: only overwrite non-empty fields from AI */
          Object.keys(u).forEach(function(k) {
            if (u[k] !== '' && u[k] !== undefined && u[k] !== null) state.circuits[existing][k] = u[k];
          });
          updated++;
        } else {
          skipped++;
        }
      });
      actions.push('Updated ' + updated + ' circuit(s)' + (skipped ? ' (skipped ' + skipped + ' unmatched)' : ''));
    }

    /* Save circuits if any circuit changes were made */
    if (parsed.updates || parsed.delete || parsed.renumber) {
      saveAllCircuits(true);
    }

    /* Board header updates */
    if (parsed.board_updates && state.currentBoard) {
      api('PUT', '/boards/' + state.currentBoard.id, parsed.board_updates).then(function(updated) {
        Object.assign(state.currentBoard, updated);
      }).catch(function() {});
      actions.push('Board: ' + Object.keys(parsed.board_updates).join(', '));
    }

    /* Inspection schedule updates */
    if (parsed.inspection_updates && parsed.inspection_updates.length > 0 && state.currentSite) {
      api('PUT', '/sites/' + state.currentSite.id + '/inspections', parsed.inspection_updates).then(function(data) {
        state.inspections = data;
      }).catch(function() {});
      var inspItems = parsed.inspection_updates.map(function(i) { return i.item_ref + '→' + i.outcome; });
      actions.push('Inspection: ' + inspItems.join(', '));
    }

    /* Observations — save and refresh list */
    if (parsed.observations && parsed.observations.length > 0 && state.currentSite) {
      var obsPromises = parsed.observations.map(function(o) {
        return api('POST', '/sites/' + state.currentSite.id + '/observations', {
          code: o.code || 'C2', description: o.description || '', location: o.location || ''
        }).then(function(saved) { state.observations.push(saved); return saved; });
      });
      Promise.all(obsPromises).then(function() {
        /* Re-render observations list so new ones appear immediately */
        if (state.currentSiteTab === 'observations') {
          var obsContainer = document.getElementById('observations-container');
          if (obsContainer) {
            var tmpDiv = document.createElement('div');
            tmpDiv.innerHTML = renderObservations();
            var newContainer = tmpDiv.querySelector('#observations-container');
            if (newContainer) obsContainer.innerHTML = newContainer.innerHTML;
          }
        }
      }).catch(function() {});
      actions.push(parsed.observations.length + ' observation(s)');
    }

    return { actions: actions, message: parsed.message || '' };
  }

  /* Show AI result banner (observations view or board detail) */
  function showAIBanner(result, transcript, parsed) {
    setTimeout(function() {
      var container = document.getElementById('observations-container') || document.getElementById('board-detail-container');
      if (!container) return;

      /* Remove any previous AI banner */
      var prev = container.querySelector('.ai-result-banner');
      if (prev) prev.remove();

      var html = '<div class="ai-result-banner p-3 bg-blue-50 border border-blue-200 rounded-xl mb-3">' +
        '<h4 class="font-bold text-blue-800 text-sm mb-1">AI Result</h4>';
      if (transcript) html += '<p class="text-xs text-slate-500"><strong>You said:</strong> "' + esc(transcript) + '"</p>';

      /* Show what AI did */
      if (result.actions.length > 0) html += '<p class="text-xs text-slate-800 mt-1 font-medium">' + esc(result.actions.join(' • ')) + '</p>';
      if (result.message) html += '<p class="text-xs text-blue-700 mt-1">' + esc(result.message) + '</p>';

      /* Show observations detail */
      if (parsed.observations && parsed.observations.length) {
        parsed.observations.forEach(function(o) {
          html += '<div class="flex items-start gap-2 mt-2 p-2 bg-white rounded border border-blue-100">' +
            '<span class="badge badge-' + (o.code || 'c2').toLowerCase() + ' text-xs shrink-0">' + esc(o.code || 'C2') + '</span>' +
            '<div class="flex-1">' +
              '<p class="text-xs text-slate-800 font-medium">' + esc(o.description) + '</p>' +
              (o.location ? '<p class="text-xs text-slate-500">Location: ' + esc(o.location) + '</p>' : '') +
            '</div>' +
          '</div>';
        });
      }

      /* Show inspection schedule mappings */
      if (parsed.inspection_updates && parsed.inspection_updates.length > 0) {
        html += '<div class="mt-2 p-2 bg-white rounded border border-blue-100">';
        html += '<p class="text-xs font-medium text-blue-800 mb-1">Inspection Schedule:</p>';
        parsed.inspection_updates.forEach(function(i) {
          var item = INSPECTION_ITEMS.find(function(x) { return x.ref === i.item_ref; });
          html += '<p class="text-xs text-slate-700">' + esc(i.item_ref) + ' → <strong>' + esc(i.outcome) + '</strong>';
          if (item) html += ' <span class="text-slate-400">(' + esc(item.desc.substring(0, 40)) + ')</span>';
          html += '</p>';
        });
        html += '</div>';
      }

      /* Action buttons */
      html += '<div class="flex gap-2 mt-3">' +
        '<button class="btn btn-sm flex-1" style="background:#dcfce7;color:#16a34a" data-action="ai-banner-ok">' +
          '&#10003; OK</button>' +
        '<button class="btn btn-sm flex-1" style="background:#dbeafe;color:#2563eb" data-action="ai-banner-amend">' +
          '&#127908; Amend</button>' +
        '<button class="btn btn-sm flex-1" style="background:#fee2e2;color:#dc2626" data-action="ai-banner-undo">' +
          '&#10007; Undo</button>' +
      '</div>';

      html += '</div>';
      var el = document.createElement('div');
      el.innerHTML = html;
      /* Store parsed data for undo */
      el.firstChild._parsed = parsed;
      container.insertBefore(el, container.firstChild);
    }, 200);
  }

  /* Undo the last AI action (remove observations it added) */
  function undoAIBanner(bannerEl) {
    var parsed = bannerEl._parsed;
    if (!parsed) { bannerEl.remove(); return; }

    /* Undo observations — delete from server and state */
    if (parsed.observations && parsed.observations.length && state.currentSite) {
      /* Find the most recently added observations matching these descriptions */
      parsed.observations.forEach(function(o) {
        var match = state.observations.slice().reverse().find(function(obs) {
          return obs.description === o.description || (obs.code === o.code && obs.location === o.location);
        });
        if (match) {
          api('DELETE', '/observations/' + match.id).catch(function() {});
          state.observations = state.observations.filter(function(x) { return String(x.id) !== String(match.id); });
        }
      });
    }

    /* Undo inspection updates — reset to N/V */
    if (parsed.inspection_updates && parsed.inspection_updates.length && state.currentSite) {
      var resets = parsed.inspection_updates.map(function(i) { return { item_ref: i.item_ref, outcome: '' }; });
      api('PUT', '/sites/' + state.currentSite.id + '/inspections', resets).then(function(data) {
        state.inspections = data;
      }).catch(function() {});
    }

    bannerEl.remove();
    toast('AI action undone', 'info');
    /* Re-render observations if on that tab */
    if (state.currentSiteTab === 'observations') {
      navigate('site-detail', { currentSiteTab: 'observations' });
    }
  }

  /* Single entry point: send any instruction to the unified AI */
  function sendToAI(userInput, opts, callback) {
    opts = opts || {};
    var provider = getSelectedProvider();
    if (!provider) {
      if (callback) callback(null, 'No AI key configured');
      return;
    }

    var mode = opts.fieldMode ? 'field' : 'full';
    var sysPrompt = buildAISystemPrompt(mode);
    var context = opts.fieldMode ? '' : buildAIContext();

    var prompt = userInput;
    if (context) prompt += '\n\n' + context;
    if (opts.fieldMode) {
      prompt = 'Target field: ' + (opts.fieldLabel || opts.fieldId || 'unknown') + '\nUser said: "' + userInput + '"\nReturn ONLY the clean value.';
      if (opts.fieldHint) sysPrompt += '\n\nField hint: ' + opts.fieldHint;
    } else {
      prompt += '\n\nReturn ONLY valid JSON.';
    }

    return api('POST', '/ai/process', {
      key_id: opts.keyId || provider.id,
      system_prompt: sysPrompt,
      prompt: prompt
    }).then(function(res) {
      if (callback) callback(res.result);
      return res.result;
    }).catch(function(err) {
      if (callback) callback(null, err.message);
      throw err;
    });
  }

  function getSelectedCircuitIndices() {
    var checks = document.querySelectorAll('.bulk-check:checked');
    var indices = [];
    checks.forEach(function(c) { indices.push(parseInt(c.getAttribute('data-idx'))); });
    return indices;

  function buildCircuitSummary(circ) {
    var p = ['#' + (circ.number || '?'), circ.description || ''];
    if (circ.wiring_type) p.push('WT:' + circ.wiring_type);
    if (circ.ref_method) p.push('Ref:' + circ.ref_method);
    if (circ.live_mm) p.push(circ.live_mm + 'mm²');
    if (circ.cpc_mm) p.push('CPC:' + circ.cpc_mm);
    if (circ.ocpd_bsen) p.push('BS' + circ.ocpd_bsen);
    if (circ.ocpd_type) p.push(circ.ocpd_type);
    if (circ.ocpd_rating) p.push(circ.ocpd_rating + 'A');
    if (circ.breaking_cap) p.push(circ.breaking_cap + 'kA');
    if (circ.poles && circ.poles !== 'SP') p.push(circ.poles);
    if (circ.rcd_bsen) p.push('RCD BS' + circ.rcd_bsen);
    if (circ.rcd_type) p.push('RCD:' + circ.rcd_type);
    if (circ.rcd_idn) p.push(circ.rcd_idn + 'mA');
    if (circ.points) p.push(circ.points + 'pts');
    if (circ.zs_measured) p.push('Zs=' + circ.zs_measured);
    if (circ.max_zs) p.push('MaxZs=' + circ.max_zs);
    if (circ.ir_ll || circ.ir_le) p.push('IR:' + (circ.ir_ll || '-') + '/' + (circ.ir_le || '-'));
    if (circ.remarks) p.push('Rem:' + circ.remarks);
    return p.join(' | ');
  }

  function aiChatSend() {

    snapshotCircuits(); /* save state before AI changes */
    var userText = input.value.trim();
    input.value = '';

    /* Build context — selected circuits or all */
    var selectedIdx = getSelectedCircuitIndices();
    var targetCircuits = selectedIdx.length > 0
      ? selectedIdx.map(function(i) { return state.circuits[i]; }).filter(Boolean)
      : state.circuits;
    var selLabel = selectedIdx.length > 0 ? selectedIdx.length + ' SELECTED circuits' : 'ALL ' + state.circuits.length + ' circuits';

    var circuitData = targetCircuits.map(buildCircuitSummary).join('\n');

    var prompt = 'You are an EICR Form 4 circuit schedule assistant.\n' +
      'User said: "' + userText + '"\n\n' +
      'Applies to ' + selLabel + ':\n' + circuitData + '\n\n' +
      'FIELD NAMES: description, wiring_type (T+E/SWA/MICC/FP/Singles/Con), ref_method (A-G, 100-103), ' +
      'points, live_mm, cpc_mm, ocpd_bsen (60898/61009/88-2), ocpd_type (B/C/D), ocpd_rating, ' +
      'breaking_cap (kA), max_zs, rcd_bsen, rcd_type (AC/A/B/S), rcd_idn (mA), ' +
      'r1, rn, r1r2, ir_test_v (250/500/1000), ir_ll (insulation L-L MΩ, use ">200"), ' +
      'ir_le (insulation L-E MΩ, use ">200"), polarity (true/false), ' +
      'zs_measured, rcd_time_x1 (ms), rcd_test_btn (true/false), afdd_test (N/A/true/false).\n' +
      'Users may say: "IR >200 for all", "all MCBs 10kA", "circuit 3 rating 32", ' +
      '"all lighting T+E 1.5", "RCD type AC for all 61009s", "Zs 0.45 circuit 1".\n' +
      'Match circuits by number, range (1-5), description pattern ("all lighting/sockets"), or "all".\n' +
      'Return ONLY valid JSON:\n' +
      '{"updates":[{"number":"...","field":"value",...}], "message":"summary of changes"}';

    /* Show loading in response area */
    var bar = document.getElementById('ai-chat-bar');
    var existingResp = document.getElementById('ai-chat-response');
    if (existingResp) existingResp.remove();
    bar.insertAdjacentHTML('beforebegin', '<div id="ai-chat-response" class="ai-chat-response"><div class="loading-spinner" style="display:inline-block;width:16px;height:16px"></div> AI thinking...</div>');

    sendToAI(prompt, {}, function(result, err) {
      var respEl = document.getElementById('ai-chat-response');
      if (err) {
        if (respEl) respEl.innerHTML = '<span style="color:#dc2626">Error: ' + esc(err) + '</span>';
        return;
      }
      try {
        var jsonMatch = result.match(/\{[\s\S]*\}/);
        var parsed = JSON.parse(jsonMatch[0]);
        if (parsed.updates && parsed.updates.length) {
          parsed.updates.forEach(function(u) {
            var circ = state.circuits.find(function(c) { return c.number === u.number; });
            if (circ) {
              Object.keys(u).forEach(function(k) {
                if (k !== 'number') circ[k] = u[k];
              });
            }
          });
          sortCircuitsByNumber();
          saveAllCircuits(true);
          navigate('board-detail');
          var msg = parsed.message || (parsed.updates.length + ' circuits updated');
          if (respEl) respEl.innerHTML = '<strong style="color:#16a34a">\u2713</strong> ' + esc(msg);
          setTimeout(function() { if (respEl) respEl.remove(); }, 5000);
        } else {
          if (respEl) respEl.innerHTML = esc(parsed.message || 'No changes made');
        }
      } catch(e) {
        if (respEl) respEl.innerHTML = esc(result.substring(0, 200));
      }
    });
  }

  var _voiceRec = null;
  var _voiceActive = false;

  /* Build context hint for AI based on field ID — used for field-mode voice */
  function getFieldContext(fieldId) {
    var field = document.getElementById(fieldId);
    var placeholder = field ? (field.placeholder || '') : '';
    var label = '';
    var labelEl = document.querySelector('label[for="' + fieldId + '"]');
    if (labelEl) label = labelEl.textContent || '';
    if (!label && placeholder) label = placeholder;

    /* Determine context from field ID patterns */
    var ctx = 'You are helping fill in a BS 7671 EICR (Electrical Installation Condition Report). ';

    if (fieldId.indexOf('r1r2') >= 0 || fieldId.indexOf('zs') >= 0 || fieldId.indexOf('ze') >= 0 ||
        fieldId.indexOf('ipf') >= 0 || fieldId.indexOf('ir_') >= 0 || fieldId.indexOf('rcd_') >= 0 ||
        fieldId.match(/_(r1|r2|rn)$/)) {
      ctx += 'This field is a TEST READING (numerical). Convert spoken numbers: "point one three" → "0.13", "nought point three five" → "0.35", "infinity" → ">200", "one point two meg" → ">200". Return ONLY the number/value, nothing else.';
    } else if (fieldId.indexOf('ocpd_bsen') >= 0 || fieldId.indexOf('bh-ocpd-bsen') >= 0) {
      ctx += 'This field is the BS(EN) standard number for a protective device. Common values: 60898 (MCBs), 61009 (RCBOs), 60947-2 (MCCBs), 88-2 (HRC fuses), 61008 (RCDs). Return ONLY the standard number.';
    } else if (fieldId.indexOf('ocpd_type') >= 0 || fieldId.indexOf('bh-ocpd-type') >= 0) {
      ctx += 'This field is the OCPD type/curve letter. Values: B (general), C (motors), D (high inrush). Return ONLY the letter.';
    } else if (fieldId.indexOf('ocpd_rating') >= 0 || fieldId.indexOf('bh-ocpd-rating') >= 0) {
      ctx += 'This field is the OCPD rating in Amps. Common: 6, 10, 16, 20, 25, 32, 40, 50, 63, 80, 100. Return ONLY the number.';
    } else if (fieldId.indexOf('rcd_idn') >= 0) {
      ctx += 'This field is the RCD rated residual operating current (IΔn) in mA. Common: 30, 100, 300. Return ONLY the number.';
    } else if (fieldId.indexOf('rcd_type') >= 0) {
      ctx += 'This field is the RCD type. Values: AC, A, B, S (selective/time-delayed). Return ONLY the type letter(s).';
    } else if (fieldId.indexOf('wiring') >= 0 || fieldId.indexOf('conductor') >= 0 || fieldId.indexOf('csa') >= 0 || fieldId.indexOf('cpc') >= 0) {
      ctx += 'This field is about wiring/conductor details. Reference designations: flat T+E, SWA, MICC, singles in conduit/trunking. CSA sizes: 1.0, 1.5, 2.5, 4, 6, 10, 16, 25mm². Return the appropriate value.';
    } else if (fieldId.indexOf('description') >= 0 || fieldId.indexOf('desc') >= 0) {
      ctx += 'This field is a circuit or observation description. Common: Lighting, Sockets, Ring Main, Radial, FCU, Cooker, Immersion, Boiler, Alarm, Emergency Lighting, Smoke Detection, Fire Alarm, Mechanical Extract, Hand Dryer, Data, Security. Capitalise properly.';
    } else if (fieldId.indexOf('instrument') >= 0) {
      ctx += 'This field is for test instrument details (make, model, serial number). Format as: "Make Model Serial" e.g. "Megger MFT1741 12345678".';
    } else if (fieldId.indexOf('address') >= 0 || fieldId.indexOf('si_') >= 0) {
      ctx += 'This field is site/address information for a commercial building (schools, offices etc). Format properly with capitalisation.';
    } else if (fieldId.indexOf('obs-') >= 0) {
      ctx += 'This is an EICR observation/defect field. Use proper electrical terminology. Classification codes: C1 (danger present), C2 (potentially dangerous), C3 (improvement recommended), FI (further investigation).';
    } else if (fieldId.indexOf('tester-') >= 0) {
      ctx += 'This field is for tester/inspector personal or qualification details.';
    } else if (fieldId.indexOf('location') >= 0 || fieldId.indexOf('loc') >= 0) {
      ctx += 'This field is a physical location within a building. e.g. "Plant Room", "Ground Floor Corridor", "Kitchen", "Main Intake". Capitalise properly.';
    } else {
      ctx += 'Field: ' + (label || fieldId) + '. Return the appropriate value for this EICR field.';
    }

    ctx += '\n\nThe field currently shows: "' + (placeholder || fieldId) + '"';
    if (field && field.value) ctx += '\nCurrent value: "' + field.value + '"';
    ctx += '\n\nIMPORTANT: Return ONLY the value to put in the field. No explanation, no quotes, no extra text. Just the clean value.';
    return ctx;
  }

  function voiceToField(fieldId) {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return toast('Speech not supported in this browser', 'error');
    var field = document.getElementById(fieldId);
    if (!field) return;
    var btn = document.querySelector('[data-voice-for="' + fieldId + '"]');
    var isChatInput = (fieldId === 'ai-chat-input');

    /* Stop any existing recognition */
    if (_voiceActive && _voiceRec) {
      _voiceActive = false;
      if (_voiceRec.stop) _voiceRec.stop(); /* works for both raw rec and handle */
      _voiceRec = null;
      if (btn) { btn.style.background = ''; btn.textContent = '🎤'; }
      return;
    }

    if (isChatInput) {
      /* Chat bar: simple single-shot, tap again to add more */
      var chatRec = simpleVoiceCapture(field, btn, '🎤', '⏹', function() {
        _voiceActive = false;
        _voiceRec = null;
      });
      if (chatRec) { _voiceActive = true; _voiceRec = chatRec; }
      return;
    }

    /* Regular fields: single-shot with AI cleanup */
    _voiceRec = new SR();
    _voiceRec.continuous = false;
    _voiceRec.interimResults = false;
    _voiceRec.lang = 'en-GB';
    _voiceActive = true;
    var startVal = field.value || '';

    _voiceRec.onresult = function(e) {
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;

      field.value = startVal ? startVal + ' ' + transcript : transcript;

      var provider = getSelectedProvider();
      if (!provider) return;

      if (btn) { btn.style.background = '#3b82f6'; btn.textContent = '⏳'; }

      var fieldHint = getFieldContext(fieldId);
      var fieldLabel = '';
      var labelEl = document.querySelector('label[for="' + fieldId + '"]');
      if (labelEl) fieldLabel = labelEl.textContent || '';
      if (!fieldLabel && field.placeholder) fieldLabel = field.placeholder;

      sendToAI(transcript, {
        fieldMode: true,
        fieldId: fieldId,
        fieldLabel: fieldLabel || fieldId,
        fieldHint: fieldHint
      }, function(result, err) {
        if (err) { if (btn) { btn.style.background = ''; btn.textContent = '🎤'; } return; }
        var cleaned = (result || '').replace(/^["']|["']$/g, '').replace(/```/g, '').trim();
        if (cleaned && cleaned.length < 500) {
          if (startVal) {
            if (cleaned.toLowerCase().indexOf(startVal.toLowerCase()) === 0) {
              field.value = cleaned;
            } else {
              field.value = startVal + ' ' + cleaned;
            }
          } else {
            field.value = cleaned;
          }
        }
        if (btn) { btn.style.background = ''; btn.textContent = '🎤'; }
        field.dispatchEvent(new Event('input', { bubbles: true }));
        field.dispatchEvent(new Event('change', { bubbles: true }));
      });
    };
    _voiceRec.onerror = function(ev) {
      _voiceActive = false;
      if (btn) { btn.style.background = ''; btn.textContent = '🎤'; }
      if (ev.error === 'aborted' || ev.error === 'no-speech') return;
      toast('Voice: ' + ev.error, 'error');
    };
    _voiceRec.onend = function() { _voiceActive = false; };

    try {
      _voiceRec.start();
      if (btn) { btn.style.background = '#ef4444'; btn.textContent = '⏹'; }
    } catch(ex) {
      toast('Mic busy — try again', 'error');
    }
  }

  /* Smart AI voice for observations — "C3 kitchen broken socket" auto-parsed */
  function voiceObservation() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return toast('Speech not supported', 'error');

    if (_voiceActive && _voiceRec) {
      try { _voiceRec.stop(); } catch(ex) {}
      _voiceActive = false;
      var voBtn = document.getElementById('voice-obs-btn');
      if (voBtn) { voBtn.style.background = ''; voBtn.innerHTML = '&#127908; SPEAK OBSERVATION'; }
      return;
    }

    _voiceRec = new SR();
    _voiceRec.continuous = false;
    _voiceRec.interimResults = false;
    _voiceRec.lang = 'en-GB';

    var voBtn = document.getElementById('voice-obs-btn');
    if (voBtn) { voBtn.style.background = '#ef4444'; voBtn.innerHTML = '&#9209; LISTENING... tap to stop'; }

    _voiceRec.onresult = function(e) {
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
      try { _voiceRec.stop(); } catch(ex) {}
      _voiceActive = false;
      if (voBtn) { voBtn.style.background = '#3b82f6'; voBtn.innerHTML = '&#9203; Parsing...'; }

      /* Parse with AI */
      var provider = getSelectedProvider();
      if (!provider) {
        /* Try manual parse as fallback */
        manualParseObservation(transcript);
        return;
      }

      /* Use unified AI brain */
      sendToAI('Inspector said: "' + transcript + '"\n\n' + buildAIContext(), {}, function(result, err) {
        if (err) { manualParseObservation(transcript); return; }
        try {
          var jsonMatch = (result || '').match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error('No JSON');
          var parsed = JSON.parse(jsonMatch[0]);
          var aiResult = processAIActions(parsed);

          closeSheet();
          navigate('site-detail', {currentSiteTab: 'observations'});

          var msg = aiResult.actions.length > 0 ? aiResult.actions.join(' • ') : 'Processed';
          if (aiResult.message) msg += ' — ' + aiResult.message;
          toast(msg, 'success');
          showAIBanner(aiResult, transcript, parsed);
        } catch(e) {
          console.error('AI parse failed:', e);
          manualParseObservation(transcript);
        }
      });
    };

    _voiceRec.onerror = function(ev) {
      _voiceActive = false;
      if (voBtn) { voBtn.style.background = ''; voBtn.innerHTML = '&#127908; SPEAK OBSERVATION'; }
      if (ev.error === 'aborted' || ev.error === 'no-speech') return;
      toast('Voice: ' + ev.error, 'error');
    };
    _voiceRec.onend = function() {
      _voiceActive = false;
      if (voBtn) { voBtn.style.background = ''; voBtn.innerHTML = '&#127908; SPEAK OBSERVATION'; }
    };

    try { _voiceRec.start(); _voiceActive = true; } catch(ex) { toast('Mic busy', 'error'); }
  }

  /* Basic fallback parser for observations without AI */
  function manualParseObservation(text) {
    var code = 'C2';
    var match = text.match(/\b(C1|C2|C3|FI)\b/i);
    if (match) code = match[1].toUpperCase();
    var desc = text.replace(/\b(C1|C2|C3|FI)\b/i, '').trim();

    /* Put it in the form fields */
    var codeEl = document.getElementById('obs-code');
    var descEl = document.getElementById('obs-description');
    if (codeEl) { codeEl.value = code; selectObsCode(code); }
    if (descEl) descEl.value = desc;
    if (!descEl) {
      /* Sheet not open, save directly */
      api('POST', '/sites/' + state.currentSite.id + '/observations', {
        code: code, description: desc, location: ''
      }).then(function(o) {
        state.observations.push(o);
        closeSheet();
        toast('Observation added', 'success');
        navigate('site-detail', {currentSiteTab: 'observations'});
      }).catch(function(err) { toast(err.message, 'error'); });
    }
    toast('Parsed: ' + code + ' — ' + desc, 'info');
  }

  /* Smart AI voice for inspection schedule — "1.1 pass, 1.2 pass, 5.17 C2" */
  function voiceInspection() {
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return toast('Speech not supported', 'error');

    if (_voiceActive && _voiceRec) {
      try { _voiceRec.stop(); } catch(ex) {}
      _voiceActive = false;
      var viBtn = document.getElementById('voice-insp-btn');
      if (viBtn) { viBtn.style.background = ''; viBtn.innerHTML = '&#127908; SPEAK OUTCOMES'; }
      return;
    }

    _voiceRec = new SR();
    _voiceRec.continuous = false;
    _voiceRec.interimResults = false;
    _voiceRec.lang = 'en-GB';

    var viBtn = document.getElementById('voice-insp-btn');
    if (viBtn) { viBtn.style.background = '#ef4444'; viBtn.innerHTML = '&#9209; LISTENING... tap to stop'; }

    _voiceRec.onresult = function(e) {
      var transcript = '';
      for (var i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
      _voiceRec.stop();
      _voiceActive = false;
      if (viBtn) { viBtn.style.background = '#3b82f6'; viBtn.innerHTML = '⏳ Parsing...'; }

      var provider = getSelectedProvider();
      if (!provider) { toast('Add an AI key in Settings', 'error'); return; }

      /* Use unified AI brain */
      sendToAI('Inspector said: "' + transcript + '"\n\n' + buildAIContext(), {}, function(result, err) {
        if (err) { toast('AI error: ' + err, 'error'); if (viBtn) viBtn.innerHTML = '🎤 SPEAK OUTCOMES'; return; }
        try {
          var jsonMatch = (result || '').match(/\{[\s\S]*\}/);
          if (!jsonMatch) throw new Error('No JSON');
          var parsed = JSON.parse(jsonMatch[0]);

          /* Also support old {items} format for backwards compat */
          if (parsed.items && !parsed.inspection_updates) {
            parsed.inspection_updates = parsed.items.map(function(i) {
              return { item_ref: i.ref, outcome: i.outcome };
            });
          }

          var aiResult = processAIActions(parsed);

          /* Update inspection dropdowns in the UI */
          if (parsed.inspection_updates) {
            parsed.inspection_updates.forEach(function(item) {
              var sel = document.querySelector('select[data-ref="' + item.item_ref + '"]');
              if (sel) {
                sel.value = item.outcome;
                sel.className = 'outcome-select outcome-' + item.outcome.toLowerCase().replace('/', '');
              }
            });
          }

          var msg = aiResult.actions.length > 0 ? aiResult.actions.join(' • ') : 'Updated';
          if (aiResult.message) msg += ' — ' + aiResult.message;
          toast(msg, 'success');
          if (viBtn) viBtn.innerHTML = '🎤 SPEAK OUTCOMES';
        } catch(parseErr) {
          toast('Parse failed: ' + parseErr.message, 'error');
          if (viBtn) viBtn.innerHTML = '🎤 SPEAK OUTCOMES';
        }
      });
    };

    _voiceRec.onerror = function(ev) { _voiceActive = false; if (viBtn) viBtn.innerHTML = '&#127908; SPEAK OUTCOMES'; if (ev.error !== 'aborted' && ev.error !== 'no-speech') toast('Voice: ' + ev.error, 'error'); };
    _voiceRec.onend = function() { _voiceActive = false; };
    try { _voiceRec.start(); _voiceActive = true; } catch(ex) { toast('Mic busy', 'error'); }
  }

  /* Get the user's preferred AI provider (or first available) */
  function getSelectedProvider() {
    if (!state.aiKeys || !state.aiKeys.length) return null;
    var preferred = localStorage.getItem('eicr_preferred_model');
    if (preferred) {
      var match = state.aiKeys.find(function(k) { return k.id === preferred; });
      if (match) return match;
    }
    return state.aiKeys[0];
  }

  function setPreferredModel(id) {
    localStorage.setItem('eicr_preferred_model', id);
    toast('Default AI model updated', 'success');
  }

  /* ===== UTILITY ===== */
  function esc(str) {
    if (str === null || str === undefined) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ===== AUTOSAVE ===== */
  var _autoSaveTimer = null;
  function autoSave(what) {
    if (_autoSaveTimer) clearTimeout(_autoSaveTimer);
    _autoSaveTimer = setTimeout(function() {
      if (what === 'inspections') autoSaveInspections();
      else if (what === 'site-info') autoSaveSiteInfo();
      else if (what === 'circuits') autoSaveCircuits();
    }, 1500); /* 1.5s debounce */
  }

  function autoSaveInspections() {
    if (!state.currentSite) return;
    var selects = document.querySelectorAll('[data-action="set-inspection-outcome"]');
    var items = [];
    selects.forEach(function(sel) {
      var ref = sel.getAttribute('data-ref');
      var val = sel.value;
      if (ref && val) items.push({item_ref: ref, outcome: val});
    });
    if (items.length === 0) return;
    api('PUT', '/sites/' + state.currentSite.id + '/inspections', items).then(function(data) {
      state.inspections = data;
      toast('Auto-saved', 'success');
    }).catch(function() {});
  }

  function autoSaveSiteInfo() {
    if (!state.currentSite) return;
    saveSiteInfo(); /* Reuse existing function */
  }

  function autoSaveCircuits() {
    if (!state.currentBoard) return;
    saveAllCircuits(true); /* silent — don't navigate or toast on success */
  }

  /* Handle change events for inspection outcomes — now auto-saves */
  document.addEventListener('change', function(e) {
    var target = e.target;
    /* Bulk select checkbox count update */
    if (target.classList && target.classList.contains('bulk-check')) {
      updateBulkCount();
    }
    if (target.getAttribute && target.getAttribute('data-action') === 'set-inspection-outcome') {
      var val = target.value;
      /* Update styling */
      target.className = 'outcome-select';
      if (val) {
        target.classList.add('outcome-' + val.toLowerCase().replace('/', ''));
      }
      /* Auto-save */
      autoSave('inspections');
    }
    /* Auto-save site info on select change */
    if (target.id && target.id.indexOf('si_') === 0 && state.view === 'site-detail' && state.currentSiteTab === 'info') {
      autoSave('site-info');
    }
    /* Default AI model preference */
    if (target.getAttribute && target.getAttribute('data-action') === 'set-preferred-model') {
      setPreferredModel(target.value);
    }
    /* Board reference photo upload (gallery or camera) */
    if ((target.id === 'board-photo-upload' || target.id === 'board-photo-cam') && target.files && target.files.length) {
      uploadBoardPhotos(target.files);
      target.value = '';
    }
    /* Observation photo — just show preview. Actual upload happens at save time via FormData */
    if (target.id === 'obs-photo' || target.id === 'obs-photo-cam') {
      if (target.files && target.files[0]) {
        var obsFile = target.files[0];
        var obsPreview = document.getElementById('obs-photo-preview');
        if (obsPreview) {
          try {
            var obsUrl = URL.createObjectURL(obsFile);
            obsPreview.innerHTML = '<img src="' + obsUrl + '" style="max-height:120px;border-radius:.5rem;margin-top:.5rem">' +
              '<div style="font-size:11px;color:#22c55e;margin-top:4px">' + obsFile.name + ' (' + Math.round(obsFile.size/1024) + 'KB) — will upload on save</div>';
          } catch(e) {
            obsPreview.innerHTML = '<div style="font-size:11px;color:#22c55e;margin-top:4px">Photo selected: ' + obsFile.name + ' (' + Math.round(obsFile.size/1024) + 'KB)</div>';
          }
        }
        window._obsPhotoData = null;
      }
    }
    /* Accumulate photos when selected (camera or gallery) */
    if (target.id === 'ai-scan-file' || target.id === 'ai-scan-file-cam') {
      if (target.files && target.files.length) {
        for (var fi = 0; fi < target.files.length; fi++) {
          addScanPhoto(target.files[fi]);
        }
        target.value = ''; /* reset so same file can be re-selected */
      }
    }
  });

  /* Auto-save site info on input blur */
  document.addEventListener('blur', function(e) {
    var target = e.target;
    if (target.id && target.id.indexOf('si_') === 0 && state.view === 'site-detail' && state.currentSiteTab === 'info') {
      autoSave('site-info');
    }
    /* Desktop inline board field edit — auto-save on blur (and change for selects) */
    if (target.getAttribute && target.getAttribute('data-board-field') && state.currentBoard) {
      var fieldMap = {
        'bh-ref':'ref', 'bh-location':'location', 'bh-supplied':'supplied_from',
        'bh-phase':'num_phases', 'bh-ocpd-bsen':'ocpd_bsen', 'bh-ocpd-type':'ocpd_type',
        'bh-ocpd-rating':'ocpd_rating', 'bh-ze':'ze', 'bh-ipf':'ipf',
        'bh-instruments-multi':'instruments_multi', 'bh-instruments-loop':'instruments_loop'
      };
      var field = fieldMap[target.id];
      if (field && state.currentBoard[field] !== target.value) {
        state.currentBoard[field] = target.value;
        api('PUT', '/boards/' + state.currentBoard.id, state.currentBoard).catch(function(){});
      }
    }
  }, true);

  /* Change event for select-based board fields (phase dropdown) */
  document.addEventListener('change', function(e) {
    var target = e.target;
    if (target.getAttribute && target.getAttribute('data-board-field') && state.currentBoard) {
      var fieldMap = {
        'bh-ref':'ref', 'bh-location':'location', 'bh-supplied':'supplied_from',
        'bh-phase':'num_phases', 'bh-ocpd-bsen':'ocpd_bsen', 'bh-ocpd-type':'ocpd_type',
        'bh-ocpd-rating':'ocpd_rating', 'bh-ze':'ze', 'bh-ipf':'ipf',
        'bh-instruments-multi':'instruments_multi', 'bh-instruments-loop':'instruments_loop'
      };
      var field = fieldMap[target.id];
      if (field && state.currentBoard[field] !== target.value) {
        state.currentBoard[field] = target.value;
        api('PUT', '/boards/' + state.currentBoard.id, state.currentBoard).catch(function(){});
      }
    }
  }, true);

  /* Handle enter key on login */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && state.view === 'login') {
      var loginPass = document.getElementById('login-pass');
      if (document.activeElement === loginPass || document.activeElement === document.getElementById('login-user')) {
        doLogin();
      }
    }
  });

  /* Close sheet on overlay tap */
  document.getElementById('sheet-overlay').addEventListener('click', function() {
    closeSheet();
  });

  /* Table cell click → inline edit or column fill */
  document.addEventListener('click', function(e) {
    if (e.target.classList && e.target.classList.contains('bulk-check')) return;

    /* Column header click → quick-fill popup */
    var th = e.target.closest('th[data-col]');
    if (th && th.closest('.test-table')) {
      openColumnFill(th.getAttribute('data-col'), th);
      return;
    }

    /* Data cell click → inline edit */
    if (_bulkSelectMode) return;
    var td = e.target.closest('td[data-col]');
    if (td) {
      var row = td.closest('tr[data-idx]');
      if (!row) return;
      var idx = parseInt(row.getAttribute('data-idx'));
      var col = td.getAttribute('data-col');
      if (!isNaN(idx) && col) {
        /* Number and description open full edit sheet */
        if (col === 'number' || col === 'description') {
          openEditCircuitSheet(idx);
        } else {
          openInlineEdit(td, idx, col);
        }
      }
      return;
    }

    /* Clicking outside table — close popups */
    if (!e.target.closest('.col-fill-popup') && !e.target.closest('.inline-edit')) {
      closePopups();
    }
  });

  /* Handle inline edit and column fill button actions */
  document.addEventListener('click', function(e) {
    var target = e.target.closest('[data-action]');
    if (!target) return;
    var action = target.getAttribute('data-action');
    if (action === 'cfp-fill') {
      applyColumnFill(target.getAttribute('data-col'), target.getAttribute('data-val'));
    } else if (action === 'cfp-custom') {
      var customVal = document.getElementById('cfp-custom');
      if (customVal && customVal.value) applyColumnFill(target.getAttribute('data-col'), customVal.value);
    } else if (action === 'ie-save') {
      saveInlineEdit(parseInt(target.getAttribute('data-idx')), target.getAttribute('data-col'));
    } else if (action === 'ie-cancel') {
      closePopups();
    }
  });

  /* ===== INIT ===== */
  function init() {
    updateOfflineBanner();
    if (state.token) {
      api('GET', '/auth/me').then(function(user) {
        state.user = user;
        navigate('sites');
        /* Preload AI keys so they're ready for photo/voice features */
        loadAiKeys();
        /* Flush any offline queue */
        flushOfflineQueue();
      }).catch(function() {
        state.token = null;
        localStorage.removeItem('eicr_token');
        navigate('login');
      });
    } else {
      navigate('login');
    }
  }

  init();

})();
</script>
</body>
</html>
